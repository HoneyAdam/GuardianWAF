apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "guardianwaf.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "guardianwaf.labels" . | nindent 4 }}
data:
  guardianwaf.yml: |
    mode: {{ .Values.config.mode }}
    listen: {{ .Values.config.listen }}
    {{- if .Values.dashboard.enabled }}
    dashboard:
      enabled: true
      listen: {{ .Values.config.dashboardListen }}
    {{- end }}
    log:
      level: {{ .Values.config.logLevel }}
      format: {{ .Values.config.logFormat }}
    engine:
      detection:
        block_threshold: {{ .Values.config.detection.blockThreshold }}
        log_threshold: {{ .Values.config.detection.logThreshold }}
        paranoia_level: {{ .Values.config.detection.paranoiaLevel }}
    {{- if .Values.config.geoip.enabled }}
    geoip:
      enabled: true
      {{- if .Values.config.geoip.dbPath }}
      db_path: {{ .Values.config.geoip.dbPath }}
      {{- end }}
      auto_download: {{ .Values.config.geoip.autoDownload }}
    {{- end }}
    {{- if .Values.upstreams }}
    upstreams:
    {{- range .Values.upstreams }}
      - name: {{ .name }}
        strategy: {{ .strategy | default "round_robin" }}
        targets:
        {{- range .targets }}
          - url: {{ .url }}
            weight: {{ .weight | default 1 }}
        {{- end }}
        {{- if .healthCheck }}
        health_check:
          enabled: {{ .healthCheck.enabled }}
          path: {{ .healthCheck.path | default "/healthz" }}
          interval: {{ .healthCheck.interval | default "10s" }}
        {{- end }}
    {{- end }}
    {{- end }}
