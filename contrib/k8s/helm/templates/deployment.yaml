apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guardianwaf.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "guardianwaf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "guardianwaf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "guardianwaf.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "guardianwaf.serviceAccountName" . }}
      {{- end }}
      containers:
        - name: guardianwaf
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
            {{- if .Values.dashboard.enabled }}
            - name: dashboard
              containerPort: 9443
              protocol: TCP
            {{- end }}
          env:
            - name: GWAF_MODE
              value: {{ .Values.config.mode | quote }}
            - name: GWAF_LISTEN
              value: {{ .Values.config.listen | quote }}
            {{- if .Values.dashboard.enabled }}
            - name: GWAF_DASHBOARD_LISTEN
              value: {{ .Values.config.dashboardListen | quote }}
            {{- end }}
            - name: GWAF_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: GWAF_LOG_FORMAT
              value: {{ .Values.config.logFormat | quote }}
            {{- if .Values.apiKey.existingSecret }}
            - name: GWAF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.existingSecret }}
                  key: {{ .Values.apiKey.existingSecretKey }}
            {{- else if .Values.apiKey.value }}
            - name: GWAF_API_KEY
              value: {{ .Values.apiKey.value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/guardianwaf
              readOnly: true
            - name: cache
              mountPath: /var/cache/guardianwaf
            {{- if .Values.tls.enabled }}
            - name: certs
              mountPath: /etc/guardianwaf/certs
              readOnly: true
            {{- end }}
            {{- range .Values.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
              readOnly: {{ .readOnly | default false }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: config
          configMap:
            {{- if .Values.existingConfigMap }}
            name: {{ .Values.existingConfigMap }}
            {{- else }}
            name: {{ include "guardianwaf.fullname" . }}-config
            {{- end }}
        - name: cache
          emptyDir:
            sizeLimit: 100Mi
        {{- if .Values.tls.enabled }}
        - name: certs
          secret:
            secretName: {{ .Values.tls.secretName }}
            optional: true
        {{- end }}
        {{- range .Values.extraVolumes }}
        - name: {{ .name }}
          {{- toYaml .source | nindent 10 }}
        {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
