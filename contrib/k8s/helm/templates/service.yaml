apiVersion: v1
kind: Service
metadata:
  name: {{ include "guardianwaf.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "guardianwaf.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "guardianwaf.selectorLabels" . | nindent 4 }}
{{- if .Values.dashboard.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "guardianwaf.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "guardianwaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  {{- with .Values.dashboard.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: dashboard
      protocol: TCP
      name: dashboard
  selector:
    {{- include "guardianwaf.selectorLabels" . | nindent 4 }}
{{- end }}
