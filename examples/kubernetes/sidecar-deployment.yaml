apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-with-waf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: myapp:latest
          ports:
            - containerPort: 3000
        - name: guardianwaf
          image: ghcr.io/guardianwaf/guardianwaf:latest
          args: ["sidecar", "--upstream", "http://localhost:3000", "--listen", ":8088"]
          ports:
            - containerPort: 8088
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 3
          resources:
            limits:
              memory: "64Mi"
              cpu: "200m"
