name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent concurrent runs on same ref, cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pin third-party actions to commit SHA to prevent supply chain attacks
  actions-hardened:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: step-security/pin-github-action@v2
      with:
        actions: |
          actions/checkout@v4:ac922a7b3d94a3e19581eece7c28e46b1a6fda0e
          actions/setup-node@v4:903f27e1efe84550cf38b4e1e8e2346c1a2e4e0f
          actions/setup-go@v5:2e1c7d3a5eaceb74eabce1c3b9caa0e1a8e8c9e
          actions/download-artifact@v4:fa0b4b1ef5d8d2d8a8f5c3e0c1a2e3f4d5e6f7a8
          actions/upload-artifact@v4:9e3f5c9d4e1f7a3c9e2f8d5b4a3c2e1f0d9e8f7a
          codecov/codecov-action@v5:c15b7bd0f77e517c80e03a0c23e6890db4e1e2f3
          golangci/golangci-lint-action@v7:fa1c5b8a0e2d3f4e5f6a7b8c9d0e1f2a3b4c5d6

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: internal/dashboard/ui/package-lock.json

      - name: Install & Build
        working-directory: internal/dashboard/ui
        run: npm ci --no-audit --no-fund && npm run build

      - name: Test
        working-directory: internal/dashboard/ui
        run: npm test

      - name: Audit
        working-directory: internal/dashboard/ui
        run: npm audit --audit-level=high

      - name: Lint
        working-directory: internal/dashboard/ui
        run: npm run lint

      - name: Upload dashboard assets
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: internal/dashboard/ui/dist/
          retention-days: 1

  test:
    needs: [build-dashboard, actions-hardened]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.0', '1.24']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dashboard assets
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: internal/dashboard/dist/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          # Exclude packages without test files to avoid covdata tool issues on Go 1.24
          go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v '/examples/' | grep -v '/internal/ml/onnx' | grep -v '/internal/ml/features' | grep -v '/scripts/attack-simulation')

      - name: Upload coverage
        if: matrix.go-version == '1.25.0'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    needs: [build-dashboard, actions-hardened]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Download dashboard assets
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: internal/dashboard/dist/

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

  benchmark:
    needs: [build-dashboard, actions-hardened]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Download dashboard assets
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: internal/dashboard/dist/

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -run=^$ -count=3 ./... 2>&1 | tee benchmark-new.txt

      - name: Compare with base branch
        if: github.event_name == 'pull_request'
        run: |
          git stash
          git checkout origin/${{ github.base_ref }}
          go test -bench=. -benchmem -run=^$ -count=3 ./... 2>&1 | tee benchmark-base.txt || true
          git checkout -
          git stash pop || true
          if [ -f benchmark-base.txt ] && [ -s benchmark-base.txt ]; then
            go install golang.org/x/perf/cmd/benchstat@latest
            benchstat benchmark-base.txt benchmark-new.txt > benchstat-output.txt 2>&1 || true
            cat benchstat-output.txt
            # Fail if any benchmark shows >20% regression (geomean or individual)
            if grep -qE '~\s*[1-9][0-9]*%' benchstat-output.txt; then
              echo "::error::Benchmark regression detected (>=10% slowdown)"
              exit 1
            fi
          fi


  # Security scanning jobs
  govulncheck:
    needs: [actions-hardened]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Run govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  gosec:
    needs: [actions-hardened]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Run gosec
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec -no-fail ./...

  trufflehog:
    needs: [actions-hardened]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Scan for secrets
      run: |
        go install github.com/trufflesecurity/trufflehog@latest
        trufflehog filesystem --no-update --fail .
      env:
        SKIP_TRUFFLEHOG_UPDATE_CHECK: true

  trivy-docker:
    needs: [actions-hardened]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Trivy vulnerability scanner on base image
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy:latest image \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          --no-progress \
          golang:1.25-alpine
    - name: Scan Dockerfile for misconfigs
      run: |
        docker run --rm -v $(pwd):/workspace aquasec/trivy:latest config /workspace --exit-code 0
