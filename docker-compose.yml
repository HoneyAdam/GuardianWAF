# GuardianWAF Docker Compose - Development Mode
# For production, use docker-compose.prod.yml with TLS-based Docker client.
# DO NOT use socket mount in production — it is a privilege escalation vector.

services:
  guardianwaf:
    image: ghcr.io/guardianwaf/guardianwaf:latest
    container_name: guardianwaf
    ports:
      - "18080:8088"   # HTTP proxy port
      - "19443:9443"  # HTTPS/dashboard port
    volumes:
      - ./guardianwaf.yaml:/etc/guardianwaf/guardianwaf.yaml:ro
      - guardianwaf-data:/var/lib/guardianwaf
      # Socket mount is removed — use docker-compose.prod.yml for production
      # which uses TLS-based Docker client (NewTLSClient in docker/client.go)
    environment:
      - GWAF_MODE=enforce
      - GWAF_LOGGING_LEVEL=info
      - GWAF_LOGGING_FORMAT=json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/guardianwaf", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - guardianwaf-network

  # Example backend services for testing
  backend:
    image: golang:1.23-alpine
    container_name: backend-primary
    working_dir: /app
    volumes:
      - ./examples/backend:/app
    command: ["go", "run", "main.go"]
    expose:
      - "3000"
    labels:
      gwaf.enable: "true"
      gwaf.host: "app.localhost"
      gwaf.upstream: "app-pool"
      gwaf.port: "3000"
      gwaf.weight: "3"
      gwaf.health.path: "/healthz"
      gwaf.lb: "weighted"
    networks:
      - guardianwaf-network
    restart: unless-stopped

  backend2:
    image: golang:1.23-alpine
    container_name: backend-secondary
    working_dir: /app
    volumes:
      - ./examples/backend:/app
    command: ["go", "run", "main.go"]
    expose:
      - "3000"
    labels:
      gwaf.enable: "true"
      gwaf.host: "app.localhost"
      gwaf.upstream: "app-pool"
      gwaf.port: "3000"
      gwaf.weight: "1"
      gwaf.health.path: "/healthz"
      gwaf.lb: "weighted"
    networks:
      - guardianwaf-network
    restart: unless-stopped

volumes:
  guardianwaf-data:
    driver: local

networks:
  guardianwaf-network:
    driver: bridge
